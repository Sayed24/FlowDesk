<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>FlowDesk</title>

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>

<body>

<div id="app">

  <!-- Mobile Overlay -->
  <div
    id="sidebarOverlay"
    class="sidebar-overlay"
  ></div>

  <!-- Sidebar -->
  <aside
    id="sidebar"
    class="sidebar"
  >

    <div class="sidebar-header">
      <div class="logo">
        FlowDesk
      </div>

      <button
        id="closeSidebar"
        class="icon-btn mobile-only"
      >
        ✕
      </button>
    </div>

    <nav class="sidebar-nav">

      <a
        href="dashboard.html"
        class="nav-link"
      >
        <span>📊</span>
        Dashboard
      </a>

      <a
        href="tasks.html"
        class="nav-link"
      >
        <span>✅</span>
        Tasks
      </a>

      <a
        href="notes.html"
        class="nav-link"
      >
        <span>📝</span>
        Notes
      </a>

      <a
        href="goals.html"
        class="nav-link"
      >
        <span>🎯</span>
        Goals
      </a>

      <a
        href="habits.html"
        class="nav-link"
      >
        <span>🔥</span>
        Habits
      </a>

      <a
        href="calendar.html"
        class="nav-link"
      >
        <span>📅</span>
        Calendar
      </a>

      <a
        href="team.html"
        class="nav-link"
      >
        <span>👥</span>
        Team
      </a>

      <a
        href="settings.html"
        class="nav-link"
      >
        <span>⚙️</span>
        Settings
      </a>

    </nav>

  </aside>

  <!-- Main -->
  <main class="main-content">

    <!-- Topbar -->

    <header class="topbar">

      <div class="topbar-left">

        <button
          id="menuBtn"
          class="icon-btn mobile-only"
        >
          ☰
        </button>

        <h1 class="page-title">
          FlowDesk
        </h1>

      </div>

      <div class="topbar-right">

        <button
          id="themeToggle"
          class="icon-btn"
        >
          🌙
        </button>

        <button
          id="notificationBtn"
          class="icon-btn"
        >
          🔔
        </button>

        <div class="user-chip">

          <div class="user-avatar">
            S
          </div>

          <div class="user-info">

            <span class="user-name">
              Demo User
            </span>

            <span class="user-role">
              Demo
            </span>

          </div>

        </div>

      </div>

    </header>

    <!-- Demo Banner -->

    <section
      id="demoBanner"
      class="demo-banner"
    >

      <span>
        You are currently using FlowDesk in Demo Mode.
      </span>

      <a
        href="login.html"
        class="btn btn-primary"
      >
        Login
      </a>

    </section>

    <!-- Dashboard Widgets -->

    <section class="dashboard-grid">

      <div class="widget-card">
        <h3>Total Tasks</h3>
        <div id="taskCount">0</div>
      </div>

      <div class="widget-card">
        <h3>Notes</h3>
        <div id="noteCount">0</div>
      </div>

      <div class="widget-card">
        <h3>Goals</h3>
        <div id="goalCount">0</div>
      </div>

      <div class="widget-card">
        <h3>Habits</h3>
        <div id="habitCount">0</div>
      </div>

    </section>

    <!-- Charts -->

    <section class="card">

      <div class="section-header">

        <h2>
          Productivity Overview
        </h2>

      </div>

      <div class="chart-wrapper">

        <canvas
          id="overviewChart"
        ></canvas>

      </div>

    </section>

    <!-- Recent Activity -->

    <section class="card">

      <div class="section-header">

        <h2>
          Recent Activity
        </h2>

      </div>

      <div id="activityFeed">

      </div>

    </section>

  </main>

</div>

<!-- Floating Action Button -->

<button
  id="fab"
  class="fab"
>
  +
</button>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script
  type="module"
  src="js/app.js"
></script>

</body>
</html>
